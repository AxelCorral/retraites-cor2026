# =============================================================================
#  hypotheses.yaml — Paramètres centralisés de la maquette de soutenabilité
#  Toute hypothèse du modèle vit ICI et nulle part ailleurs.
#  C'est ce fichier qui incarne la promesse de transparence/reproductibilité.
#  Chaque paramètre est SOURCÉ et DATÉ.
# =============================================================================

meta:
  projet: "Soutenabilite_retraites_FR"
  millesime_demographie: "Insee Premiere n2108, 08/06/2026"
  perimetre: "Systeme entier (convention macro agregee, esprit COR)"
  auteur: "Axel Corral"
  date_creation: "2026-06-09"

# -----------------------------------------------------------------------------
#  EQUATION FONDAMENTALE
#  tau*(t) = [R(t)/A(t)] * [Pbar(t)/Wbar(t)]
#  tau* = taux de cotisation d'equilibre
#  R/A  = ratio de dependance ECONOMIQUE (retraites / cotisants)
#  P/W  = pension moyenne relative au salaire moyen
# -----------------------------------------------------------------------------

# --- Scenarios demographiques Insee 2026 retenus -----------------------------
# Source: Insee Premiere n2108, figure 3 (population) + Insee Resultats compagnon
#         (a telecharger: population par sexe x age fin x annee x scenario)
scenarios_demo:
  - central          # ICF 1.45 des 2028, solde migratoire +150 000/an
  - fecondite_basse  # ICF 1.20
  - fecondite_haute  # ICF 1.70
  - migration_basse  # +70 000/an
  - migration_haute  # +230 000/an

# --- Passage demographique -> economique -------------------------------------
# Taux d'activite/emploi par age : a remplacer par les projections Insee de
# population active (millesime post-2026 si dispo, sinon 2021 + montee reforme).
# Valeurs PLACEHOLDER a calibrer — NE PAS utiliser en l'etat pour conclure.
emploi:
  source: "PLACEHOLDER - a remplacer par Insee proj. pop. active + conventions COR"
  age_min_actif: 20
  age_max_actif: 64
  taux_chomage_cible: 0.045        # convention COR scenario reference (a verifier)
  # reforme 2023 : montee age effectif de depart vers 64 ans
  age_depart_effectif_2026: 62.8   # PLACEHOLDER (DREES)
  age_depart_effectif_cible: 64.0
  annee_cible_reforme: 2030

# --- Pensions ----------------------------------------------------------------
pensions:
  source: "COR, rapport annuel juin 2025 (tableau indicateurs recapitulatifs)"
  age_min_retraite: 65            # simplification v0 ; affinable avec taux par age DREES
  # Pension moyenne tous regimes / revenu d'activite BRUT moyen (indicateur COR propre).
  # NE PAS recalculer par division DREES : concepts differents.
  # Validation scenario L 2070 : cible ~0.32-0.37 selon productivite (COR juin 2025).
  ratio_pension_salaire_2026: 0.52  # COR juin 2025 : ~52%, valeur ~2022, tous regimes

# --- Hypotheses economiques (reprises du COR) --------------------------------
economie:
  source: "COR, rapport annuel juin 2025 (a verifier millesime)"
  croissance_productivite_reference: 0.007   # COR juin 2025 : scenario de reference (convergence 0.7%/an)
  croissance_productivite_basse: 0.004
  croissance_productivite_haute: 0.016
  part_salaires_dans_PIB: 0.57               # PLACEHOLDER pour conversion pts de PIB

# --- Regime d'indexation (les deux scenarios polaires) -----------------------
indexation:
  # Scenario L : legislation constante => pensions indexees sur PRIX
  #              => P/W derive a la baisse au rythme de la productivite
  # Scenario N : parite de niveau de vie maintenue => P/W constant (contrefactuel)
  scenario_actif: "N"   # "L" ou "N" — v0 demarre en N (parite)

# --- Seuils de lecture (PAS l'objet scientifique, lecture illustrative) -------
seuils_lecture:
  assiette: "cout_total_travail"   # brut | super_brut | cout_total_travail
  valeurs_test: [0.45, 0.50, 0.55] # analyse de sensibilite au seuil

# --- Fichiers de donnees brutes (data/raw/, lecture seule) -------------------
donnees:
  ip2108_xlsx: "data/raw/ip2108_donnees_2026-06-08.xlsx"
  # URL source : https://www.insee.fr/fr/statistiques/fichier/9004289/ip2108.xlsx
  # Telecharge le 2026-06-09, horodate fichier 2026-06-08.
  # Compagnon IP2108 — population par age fin x annee (1962-2070), tous scenarios
  # Source centrale : https://www.insee.fr/fr/statistiques/8990852
  # Scenarios a 1 composante : https://www.insee.fr/fr/statistiques/8990856
  # Telecharges le 2026-06-13.
  ip2108_central:   "data/raw/ip2108_central_2026-06-13.xlsx"
  ip2108_fec_haute: "data/raw/ip2108_fec_haute_2026-06-13.xlsx"
  ip2108_fec_basse: "data/raw/ip2108_fec_basse_2026-06-13.xlsx"
  ip2108_smi_haut:  "data/raw/ip2108_smi_haut_2026-06-13.xlsx"
  ip2108_smi_bas:   "data/raw/ip2108_smi_bas_2026-06-13.xlsx"
  # Données COR juin 2026 — data/raw/cor2026/ (lecture seule, téléchargés le 2026-06-13)
  # Source : https://www.cor-retraites.fr/publications/rapport-annuel-2026
  cor2026_rapport:          "data/raw/cor2026/cor2026_rapport.pdf"
  cor2026_synthese:         "data/raw/cor2026/cor2026_synthese.pdf"
  cor2026_donnees_P1:       "data/raw/cor2026/cor2026_donnees_P1.xlsx"
  cor2026_donnees_P2:       "data/raw/cor2026/cor2026_donnees_P2.xlsx"
  cor2026_donnees_P3:       "data/raw/cor2026/cor2026_donnees_P3.xlsx"
  cor2026_donnees_P4:       "data/raw/cor2026/cor2026_donnees_P4.xlsx"
  cor2026_donnees_synthese: "data/raw/cor2026/cor2026_donnees_synthese.xlsx"

# --- Tests de calage (chiffres officiels IP2108, scenario central) -----------
# Le modele DOIT reproduire ces valeurs avant toute conclusion.
calage:
  ratio_dependance_demo:          # 65+ / 20-64, pour 100
    "2026": 40
    "2040": 49
    "2070": 62
  population_totale_millions:     # scenario central
    "2026": 69.082
    "2037": 69.768
    "2070": 65.887
  tolerance: 1.0                  # tolerance absolue (arrondis Insee)

# --- Modele de passage demographique -> economique (Niveau 2, bandes) --------
# Granularite : bandes avec zone de transition fine 55-69.
# Sources alpha : Insee, enquete Emploi 2024 (taux d'emploi BIT par age).
#   Agr. observees : 25-49=82.7%, 55-59=77.8%, 60-64=42.4% (publiees TEF 2025).
#   Bandes 60-61/62-63/64-66 decomposent le 60-64 en coherence avec l'age effectif
#   moyen de depart en retraite (63 ans 7 mois en 2024, DREES, ed. 2025).
modele:
  granularite: "bandes_zone_transition_fine"
  bandes:                         # bornes inclusives
    - {nom: "20-24", min: 20, max: 24}
    - {nom: "25-54", min: 25, max: 54}
    - {nom: "55-59", min: 55, max: 59}
    - {nom: "60-61", min: 60, max: 61}
    - {nom: "62-63", min: 62, max: 63}
    - {nom: "64-66", min: 64, max: 66}
    - {nom: "67-69", min: 67, max: 69}
    - {nom: "70+",   min: 70, max: 106}
  # alpha = taux d'emploi BIT par bande. Source : Insee EE 2024.
  # 25-54: 0.84 calibre sur concept cotisants COR (EE 2024 : 25-49=82.7%, 50-54~81%).
  # 60-64 moyen pondere ~40% vs EE 2024 60-64=42.4% : ecart lie a la granularite ; a affiner.
  taux_activite_2026:  {"20-24": 0.55, "25-54": 0.84, "55-59": 0.78, "60-61": 0.50, "62-63": 0.30, "64-66": 0.12, "67-69": 0.05, "70+": 0.02}
  # cible = surcroit RESTANT de la reforme 2023 (hausse 2023-2024 deja dans profil 2026).
  taux_activite_cible: {"20-24": 0.55, "25-54": 0.84, "55-59": 0.78, "60-61": 0.58, "62-63": 0.45, "64-66": 0.20, "67-69": 0.06, "70+": 0.02}
  # rho = taux de retraites droit direct. Ancre : age conjoncturel de depart
  # regime general = 63 ans 7 mois en 2024 (DREES, Les retraites et les retraites, ed. 2025).
  # Profil cible reflete le report progressif de l'age de depart vers 64 ans (reforme 2023).
  taux_retraite_2026:  {"20-24": 0.00, "25-54": 0.00, "55-59": 0.02, "60-61": 0.15, "62-63": 0.50, "64-66": 0.85, "67-69": 0.97, "70+": 0.93}
  taux_retraite_cible: {"20-24": 0.00, "25-54": 0.00, "55-59": 0.02, "60-61": 0.05, "62-63": 0.28, "64-66": 0.80, "67-69": 0.97, "70+": 0.98}
  # Source rho(70+) : DREES ed. 2025 (~93% des 70+ residants ont un droit direct en 2023).
  # Montee vers 0.98 en 2070 : hausse couverture (generations avec carrieres completes).
  montee_couverture_70plus: {annee_debut: 2026, annee_fin: 2070}
  scenario_activite: "activite_figee_2026"  # "activite_figee_2026" | "activite_projetee"
  # taux_activite_2070 : utilises si scenario_activite = "activite_projetee".
  # Source : COR rapport annuel juin 2025 (scenario central d'activite) + tendances structurelles.
  taux_activite_2070:  {"20-24": 0.57, "25-54": 0.87, "55-59": 0.82, "60-61": 0.65, "62-63": 0.52, "64-66": 0.38, "67-69": 0.12, "70+": 0.03}
  reforme_2023:
    annee_debut: 2026
    annee_plein_effet: 2030

# --- Calage economique (cibles observees 2026 + benchmarks COR) --------------
# Sources : COR rapport annuel juin 2025 ; DREES "Les retraites et les retraites" ed. 2025.
calage_economique:
  cibles_2026:
    cotisants_M: 30.0                # COR juin 2025 : ~30.4 M cotisants en 2023
    retraites_residant_M: 16.3       # DREES ed. 2025 : droit direct residant France (fin 2023)
    ratio_RA: 0.56                   # COR : ~1.8 cotisant/retraite => R/A ≈ 0.56
    taux_cotisation_effectif: 0.28   # cotisations retraites / masse salariale brute
  benchmarks_COR_2070:               # validation finale, pas un test v1
    # COR juin 2025 (ancien millésime, conservé pour traçabilité)
    ratio_RA_cor2025: 0.71
    retraites_M_cor2025: 21.6
    depenses_pct_PIB_cor2025: 14.2
    pw_L_g007_cor2025: 0.37  # P/W scenario L, g=0.7%/an — COR juin 2025
    # COR juin 2026 (nouveau millésime, IP2108 + LFSS 2026)
    # Source : cor2026_donnees_synthese.xlsx (onglets Dépenses en %, Fig 2.3)
    ratio_RA_cor2026: 0.766       # 1 / 1.305 cotisants/retraités — Fig 2.3 P2
    depenses_pct_PIB_cor2026: 15.30  # Dépenses %PIB Sc. Ref — onglet Dépenses en %
    solde_pct_PIB_cor2026: -2.39     # Solde %PIB Sc. Ref — onglet Solde dépenses ressources
    pw_ref_cor2026: 0.453         # P/W Sc. Ref COR 2026 (incl. revalorisation Agirc-Arrco partielle)

# --- Parametres d'analyse de sensibilite -------------------------------------
# Ces parametres pilotent les figures de frontieres d'equilibre (fig.3).
# NE PAS interpreter le decalage d'age comme une prediction de reforme :
# c'est une cartographie des possibles (levier politique).
sensibilite:
  # Levier age de depart : decalage du profil rho ET alpha (en annees entires).
  # decalage=0 : profil cible post-reforme 2023 (~64 ans effectif).
  # decalage=1 : ~65 ans ; decalage=2 : ~66 ans.
  decalages_age_depart: [0, 1, 2]
  horizons_frontiere: [2040, 2050, 2070]
